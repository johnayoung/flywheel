name: Bug Report
description: Report a bug in Flywheel
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Create a task file with ...
        2. Run `flywheel run`
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, Git version, Flywheel version.
      placeholder: |
        - OS: macOS 15.1
        - Go: 1.26.0
        - Git: 2.47.0
        - Flywheel: v0.1.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any error output or logs.
      render: shell
